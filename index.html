<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>শেখ নূর আলম সিদ্দিকী</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }
    img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #667eea;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 20px 0 10px;
      color: #222;
      border-bottom: 3px solid #667eea;
      display: inline-block;
      padding-bottom: 5px;
    }
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin: 8px 5px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }
    a:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="profile.jpg" alt="প্রোফাইল ছবি">
    <h1>শেখ নূর আলম সিদ্দিকী</h1>
    <p>আমি একজন ক্ষুদ্র উদ্যোক্তা</p>
    <div class="links">
      <a href="https://facebook.com/sheikhnuralamsiddiki">Facebook</a>
      <a href="https://github.com/nuralamsiddiki">GitHub</a>
      <a href="mailto:alam313210@gmail.com">Email</a>
    </div>
  </div>
</body>
</html>
