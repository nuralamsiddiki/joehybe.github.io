<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[তোমার নাম]</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
   .card {
      background: white;
      max-width: 420px;
      width: 100%;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }
    img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #667eea;
    }
    h1 {
      color: #333;
      margin: 20px 0 10px;
    }
    p {
      color: #666;
      font-size: 16px;
    }
   .links a {
      display: inline-block;
      margin: 8px 5px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }
   .links a:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://via.placeholder.com/130" alt="Profile Picture">
    <h1>[তোমার নাম লিখো]</h1>
    <p>[তুমি কী করো বা শখ লিখো]</p>
    <div class="links">
      <a href="https://facebook.com/[username]">Facebook</a>
      <a href="https://github.com/[username]">GitHub</a>
      <a href="mailto:[email]">Email</a>
    </div>
  </div>
</body>
</html>
